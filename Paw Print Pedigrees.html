<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paw Print Pedigrees — Design Exploration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-theme="orivet">

  <template id="__bundler_thumbnail" data-bg-color="#f3f1ec">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#f3f1ec"/>
      <g transform="translate(600 400)">
        <circle cx="-110" cy="-50" r="36" fill="#0b2a2e"/>
        <circle cx="-40" cy="-90" r="36" fill="#0b2a2e"/>
        <circle cx="40" cy="-90" r="36" fill="#0b2a2e"/>
        <circle cx="110" cy="-50" r="36" fill="#0b2a2e"/>
        <path d="M 0 -20 C -90 -20 -140 70 -140 130 C -140 180 -100 200 -50 200 C -20 200 -10 180 0 180 C 10 180 20 200 50 200 C 100 200 140 180 140 130 C 140 70 90 -20 0 -20 Z" fill="#e8a13a"/>
      </g>
    </svg>
  </template>


  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
  const { useState } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "screen": "kennel",
    "isLoggedIn": true,
    "onboardingComplete": false
  }/*EDITMODE-END*/;

  const SCREENS = [
    {id:'landing', label:'01 Landing'},
    {id:'signup', label:'02 Sign-up'},
    {id:'kennel', label:'03 Onboarding flow'},
    {id:'myprofile', label:'04 My Profile (editable)'},
    {id:'search', label:'05 Search'},
    {id:'breed', label:'06 Breed'},
    {id:'profile', label:'07 Breeder Profile'},
    {id:'animal', label:'08 Animal'},
    {id:'about', label:'09 About'},
  ];

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [selectedAnimal, setSelectedAnimal] = React.useState(null);

    const onNav = (id, ctx) => {
      if (ctx && ctx.animal !== undefined) setSelectedAnimal(ctx.animal);
      setTweak('screen', id);
    };

    let screen = null;
    const screenProps = {
      onNav,
      isLoggedIn: !!tweaks.isLoggedIn,
      setLoggedIn: (v)=>setTweak('isLoggedIn', v),
      onboardingComplete: !!tweaks.onboardingComplete,
      setOnboardingComplete: (v)=>setTweak('onboardingComplete', v),
      selectedAnimal,
    };
    switch (tweaks.screen) {
      case 'landing': screen = <Landing {...screenProps} />; break;
      case 'signup': screen = <SignUp {...screenProps} />; break;
      case 'kennel': screen = <KennelProfile {...screenProps} />; break;
      case 'myprofile': screen = <MyProfilePage {...screenProps} />; break;
      case 'search': screen = <SearchPage {...screenProps} />; break;
      case 'breed': screen = <BreedPage {...screenProps} />; break;
      case 'profile': screen = <BreederProfile {...screenProps} />; break;
      case 'animal': screen = <AnimalPage {...screenProps} />; break;
      case 'about': screen = <AboutPage {...screenProps} />; break;
      default: screen = <Landing {...screenProps} />;
    }

    return (
      <div className="app">
        <div data-screen-label={SCREENS.find(s=>s.id===tweaks.screen)?.label}>
          {screen}
        </div>

        <TweaksPanel title="Tweaks">
          <TweakSection title="Screen">
            <TweakSelect
              label="Show screen"
              value={tweaks.screen}
              options={SCREENS.map(s=>({value:s.id, label:s.label}))}
              onChange={v=>setTweak('screen', v)}
            />
          </TweakSection>
          <TweakSection title="Auth state">
            <TweakToggle
              label="Logged in"
              value={!!tweaks.isLoggedIn}
              onChange={v=>setTweak('isLoggedIn', v)}
            />
            <TweakToggle
              label="Onboarding complete"
              value={!!tweaks.onboardingComplete}
              onChange={v=>setTweak('onboardingComplete', v)}
            />
          </TweakSection>
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
