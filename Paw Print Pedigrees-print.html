<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Paw Print Pedigrees — Print</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Print-specific overrides */
    html, body { background: #fff; }
    .screen-pager,
    .tweaks-panel,
    .tweaks-fab,
    .toast,
    .demo-row { display: none !important; }

    /* Stack all screens vertically for printing */
    .print-stack { display: block; }
    .print-screen {
      break-inside: avoid;
      page-break-inside: avoid;
      break-after: page;
      page-break-after: always;
    }
    .print-screen:last-child {
      break-after: auto;
      page-break-after: auto;
    }
    .print-screen-label {
      font-family: var(--font-display, 'Fraunces', serif);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #999;
      padding: 8px 32px 0;
    }

    @page {
      size: A4 portrait;
      margin: 10mm;
    }
    @media print {
      html, body { background: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .screen-pager, .tweaks-panel, .tweaks-fab, .toast, .demo-row { display: none !important; }
      .print-screen {
        break-after: page;
        page-break-after: always;
      }
      .print-screen:last-child {
        break-after: auto;
        page-break-after: auto;
      }
      /* Disable animations/transitions */
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
      /* Remove sticky/fixed positioning that breaks print flow */
      .top-nav, .nav-top { position: static !important; }
    }
  </style>
</head>
<body data-theme="vibrant">

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
  const { useEffect } = React;

  const SCREENS = [
    {id:'landing', label:'01 Landing', Comp: Landing},
    {id:'signup', label:'02 Sign-up', Comp: SignUp},
    {id:'kennel', label:'03 Kennel · Address Details', Comp: KennelProfile, props:{variant:'Address Details'}},
    {id:'search', label:'04 Search', Comp: SearchPage},
    {id:'breed', label:'05 Breed', Comp: BreedPage},
    {id:'profile', label:'06 Breeder Profile', Comp: BreederProfile},
  ];

  function PrintApp() {
    useEffect(() => {
      document.body.setAttribute('data-theme', 'vibrant');
    }, []);
    const onNav = () => {}; // no-op for print
    return (
      <div className="app print-stack">
        {SCREENS.map(({id, label, Comp, props}) => (
          <section key={id} className="print-screen" data-screen-label={label}>
            <div className="print-screen-label">{label}</div>
            <Comp onNav={onNav} {...(props||{})} />
          </section>
        ))}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<PrintApp />);

  // Auto-print once fonts + layout are ready
  (async function autoPrint(){
    try {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }
    } catch(e) {}
    // Wait for React render + images
    await new Promise(r => setTimeout(r, 1200));
    window.print();
  })();
  </script>
</body>
</html>
